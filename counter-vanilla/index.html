<!doctype html>
<html>
  <head>
    <title>Redux basic example</title>
    <script src="https://unpkg.com/redux@4.2.1/dist/redux.min.js"></script>
  </head>
  <body>
    <div>
      <p>
        Clicked: <span id="value">0</span> times
        <button id="increment">+</button>
        <button id="decrement">-</button>
        <button id="incrementIfOdd">Increment if odd</button>
        <button id="incrementAsync">Increment async</button>
      </p>
    </div>
    <script>
      // reducer setup below
      function counterReducer(state = 0, action) {
        switch (action.type) {
          case "INCREMENT":
            return state + 1;
          case "DECREMENT":
            return state - 1;
          default:
            return state;
        }
      }

      // state + UI wiring
      var counterStore = Redux.createStore(counterReducer);
      var countNode = document.getElementById("value");

      function updateDisplay() {
        countNode.textContent = String(counterStore.getState());
      }

      function sendCountAction(actionType) {
        counterStore.dispatch({ type: actionType });
      }

      updateDisplay();
      counterStore.subscribe(updateDisplay);

      document
        .getElementById("increment")
        .addEventListener("click", function () {
          sendCountAction("INCREMENT");
        });

      document
        .getElementById("decrement")
        .addEventListener("click", function () {
          sendCountAction("DECREMENT");
        });

      document
        .getElementById("incrementIfOdd")
        .addEventListener("click", function () {
          if (counterStore.getState() % 2 !== 0) {
            sendCountAction("INCREMENT");
          }
        });

      document
        .getElementById("incrementAsync")
        .addEventListener("click", function () {
          setTimeout(function () {
            sendCountAction("INCREMENT");
          }, 1000);
        });
    </script>
  </body>
</html>
